[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — ruff format handles this
]

[tool.ruff.lint.isort]
known-first-party = ["agent"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
no_implicit_reexport = true

[[tool.mypy.overrides]]
module = [
    "plotly.*",
    "matplotlib.*",
    "moto.*",
    "fpdf.*",
    "sqlparse.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["agent.validator"]
disable_error_code = ["no-untyped-call"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: runs against real AWS dev environment, requires credentials (deselect with '-m not integration')",
]
addopts = "-m 'not integration'"
